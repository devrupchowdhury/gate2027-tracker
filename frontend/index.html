<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE 2027 — AI Mentor</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* KEEP YOUR EXISTING CSS (unchanged) */
</style>
</head>

<body>

<div id="toast"></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo">GATE <em>2027</em></div>
    <div class="auth-tag">AI Mentor · CSE · Sign in to continue</div>
    <div class="auth-card">
      <div id="clerk-mount"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" style="display:none;">
  <!-- KEEP YOUR FULL APP UI HERE (UNCHANGED) -->
</div>

<!-- ✅ CLEAN SCRIPT (ONLY THIS ONE) -->
<script>
const API = "https://gate-agent-api.onrender.com";

let clerk = null;
let token = null;

async function boot() {
  const CLERK_KEY = "pk_test_Zml0LW1vc3F1aXRvLTc4LmNsZXJrLmFjY291bnRzLmRldiQ";

  const script = document.createElement("script");
  script.src = "https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js";
  script.async = true;

  script.onload = async () => {
    try {
      window.Clerk.publishableKey = CLERK_KEY;
      await window.Clerk.load();

      clerk = window.Clerk;

      if (clerk.user) {
        onSignedIn();
      } else {
        clerk.mountSignIn(document.getElementById("clerk-mount"));

        clerk.addListener(({ user }) => {
          if (user) onSignedIn();
        });
      }
    } catch (err) {
      console.error("Clerk Init Error:", err);
    }
  };

  document.head.appendChild(script);
}

async function onSignedIn() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "block";

  const u = clerk.user;

  const name =
    u.firstName ||
    u.username ||
    u.emailAddresses[0]?.emailAddress?.split("@")[0] ||
    "User";

  document.getElementById("u-name").textContent = name;
  document.getElementById("u-av").textContent = name[0].toUpperCase();

  token = await clerk.session.getToken();

  // auto refresh token
  setInterval(async () => {
    if (clerk?.session) {
      token = await clerk.session.getToken();
    }
  }, 50000);

  initApp();
}

async function signOut() {
  if (clerk) {
    await clerk.signOut();
    location.reload();
  }
}

async function api(method, path, body) {
  const headers = {
    "Content-Type": "application/json",
  };

  if (token) {
    headers["Authorization"] = `Bearer ${token}`;
  }

  const res = await fetch(API + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });

  if (!res.ok) {
    throw new Error(await res.text());
  }

  return res.json();
}

/* =========================
   KEEP YOUR EXISTING LOGIC
   (go, sendMsg, dashboard etc.)
========================= */

function initApp() {
  console.log("App initialized");
  // your existing init code
}

/* START APP */
boot();
</script>

</body>
</html>
